<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="../assets/bootstrap-5.3.0-alpha1-dist/css/bootstrap.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./index.css" />
    <title>Login — Nomopro Desktop</title>
  </head>
  <body>
    <main>
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-md-6 col-lg-5">
            <div class="card">
              <div class="logo-wraper text-center">
                <h2>Welcome to Nomopro Desktop</h2>
                <p class="text-muted">Masuk untuk melanjutkan ke aplikasi</p>
              </div>
              <div class="card-body">
                <form id="loginForm" novalidate>
                  <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input
                      type="email"
                      class="form-control"
                      id="email"
                      name="email"
                      value=""
                      required
                    />
                  </div>

                  <div class="mb-3">
                    <label for="password" class="form-label">Kata sandi</label>
                    <div class="input-group">
                      <input
                        type="password"
                        class="form-control"
                        id="password"
                        name="password"
                        required
                      />
                      <button
                        class="btn btn-outline-secondary"
                        type="button"
                        id="togglePwd"
                      >
                        Tampilkan
                      </button>
                    </div>
                  </div>

                  <div class="helper-row">
                    <div>
                      <input type="checkbox" id="remember" />
                      <label for="remember">Ingat saya</label>
                    </div>
                    <div>
                      <a href="#" id="forgot">Lupa kata sandi?</a>
                    </div>
                  </div>

                  <div class="alert alert-danger mt-3" id="error">
                    Email atau kata sandi salah.
                  </div>

                  <button
                    type="submit"
                    id="login"
                    class="btn btn-primary w-100 mt-3"
                  >
                    Masuk
                  </button>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="../assets/bootstrap-5.3.0-alpha1-dist/js/bootstrap.min.js"></script>
    <script>
      // small UI enhancements
      const pwd = document.getElementById("password");
      const toggle = document.getElementById("togglePwd");
      const error = document.getElementById("error");
      error.style.display = "none";

      toggle.addEventListener("click", () => {
        if (pwd.type === "password") {
          pwd.type = "text";
          toggle.textContent = "Sembunyikan";
        } else {
          pwd.type = "password";
          toggle.textContent = "Tampilkan";
        }
      });

      document.getElementById("loginForm").addEventListener("submit", (e) => {
        e.preventDefault();
        // placeholder: replace with real auth
        const email = document.getElementById("email").value.trim();
        const pass = pwd.value.trim();
        if (!email || !pass) {
          error.textContent = "Lengkapi email dan kata sandi.";
          error.style.display = "block";
          return;
        }
        error.style.display = "none";
      });
    </script>
  </body>
</html>
