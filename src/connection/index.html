<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="../assets/bootstrap-5.3.0-alpha1-dist/css/bootstrap.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg1: #f5f7fb;
        --bg2: #e9f0ff;
        --accent: #4b7bec;
        --muted: #6b7280;
        --card-radius: 14px;
        --max-width: 820px;
      }

      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          Arial;
        background: linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      .wrap {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .card-panel {
        background: #fff;
        border-radius: var(--card-radius);
        box-shadow: 0 10px 30px rgba(44, 62, 80, 0.08);
        max-width: var(--max-width);
        width: 100%;
        padding: 32px;
        display: flex;
        gap: 24px;
        align-items: center;
      }

      .card-left {
        flex: 1;
      }
      .card-right {
        width: 220px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .title {
        font-size: 28px;
        font-weight: 700;
        margin: 0;
        color: #0f1724;
      }
      .subtitle {
        margin-top: 8px;
        color: var(--muted);
        font-size: 15px;
      }

      .loader {
        width: 84px;
        height: 84px;
        border-radius: 50%;
        display: inline-block;
        background: conic-gradient(var(--accent), #a3bffa33 40%, #e6eefc 60%);
        animation: spin 1.6s linear infinite;
        box-shadow: inset 0 -8px 18px rgba(255, 255, 255, 0.6);
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .recon {
        margin-top: 14px;
        color: var(--muted);
        font-weight: 600;
      }

      .hero-img {
        max-width: 160px;
        width: 100%;
        height: auto;
        border-radius: 10px;
      }

      .actions {
        margin-top: 18px;
        display: flex;
        gap: 10px;
      }
      .btn-primary-custom {
        background: var(--accent);
        border: none;
        color: #fff;
        padding: 10px 16px;
        border-radius: 10px;
      }
      .btn-ghost {
        background: transparent;
        border: 1px solid #e6eefc;
        color: var(--accent);
        padding: 10px 16px;
        border-radius: 10px;
      }

      @media (max-width: 720px) {
        .card-panel {
          flex-direction: column;
          align-items: stretch;
          padding: 20px;
        }
        .card-right {
          width: 100%;
          justify-content: flex-start;
        }
        .hero-img {
          max-width: 120px;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card-panel">
        <div class="card-left">
          <h1 class="title">Koneksi Terputus</h1>
          <div class="subtitle">
            Koneksi internet terputus. Periksa jaringan Anda dan coba lagi.
          </div>

          <div
            style="
              margin-top: 18px;
              display: flex;
              align-items: center;
              gap: 18px;
            "
          >
            <div class="loader" aria-hidden="true"></div>
            <div>
              <div id="recon" class="recon">Mencoba menyambung</div>
              <div class="actions">
                <button
                  class="btn-primary-custom"
                  onclick="window.location.reload()"
                >
                  Muat ulang
                </button>
                <button class="btn-ghost" onclick="openSupport()">
                  Bantuan
                </button>
              </div>
            </div>
          </div>
        </div>
        <div class="card-right">
          <img
            class="hero-img"
            src="../assets/img/nomokit.png"
            alt="device image"
          />
        </div>
      </div>
    </div>

    <script src="../assets/bootstrap-5.3.0-alpha1-dist/js/bootstrap.min.js"></script>
    <script>
      const recon = document.getElementById("recon");
      let dots = 0;
      const maxDots = 4;

      function startIndicator() {
        dots = (dots + 1) % (maxDots + 1);
        const dotsText = ".".repeat(dots);
        recon.textContent = `Mencoba menyambung${dotsText}`;
      }

      let indicatorTimer = null;
      document.addEventListener("DOMContentLoaded", () => {
        indicatorTimer = setInterval(startIndicator, 700);
      });

      function openSupport() {
        // placeholder: replace with real support action if available
        alert(
          "Periksa koneksi Wi‑Fi atau kabel. Jika masih bermasalah, lihat dokumentasi atau hubungi dukungan.",
        );
      }
    </script>
  </body>
</html>
