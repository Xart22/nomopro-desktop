name: Desktop CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies (skip native rebuild for CI)
        run: npm ci --ignore-scripts

      - name: Install Python payload
        run: node scripts/install_python_payload.js --win

      - name: Install Arduino CLI
        run: choco install arduino-cli --no-progress

      - name: Create Arduino CLI config
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src/link/tools/Arduino/arduino-data/staging
          @"
          daemon:
            port: "50051"
          directories:
            data: .\arduino-data
            downloads: .\arduino-data\staging
            user: .\arduino-data
          library:
            enable_unsafe_install: false
          logging:
            file: ""
            format: text
            level: info
          board_manager:
            additional_urls:
              - https://dl.espressif.com/dl/package_esp32_index.json
          "@ | Set-Content -Path src/link/tools/Arduino/arduino-cli.yaml

      - name: Run tests
        run: npm run test:smoke

      - name: Build (unsigned)
        run: npm run build -- --publish=never

      - uses: actions/upload-artifact@v4
        with:
          name: nomokit-desktop-windows
          path: dist/**

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Python payload
        run: |
          brew install zstd
          node scripts/install_python_payload.js --mac

      - name: Install Arduino CLI
        run: brew install arduino-cli

      - name: Create Arduino CLI config
        run: |
          mkdir -p src/link/tools/Arduino/arduino-data/staging
          cat > src/link/tools/Arduino/arduino-cli.yaml << 'EOF'
          daemon:
            port: "50051"
          directories:
            data: ./arduino-data
            downloads: ./arduino-data/staging
            user: ./arduino-data
          library:
            enable_unsafe_install: false
          logging:
            file: ""
            format: text
            level: info
          board_manager:
            additional_urls:
              - https://dl.espressif.com/dl/package_esp32_index.json
          EOF

      - name: Run tests
        run: npm run test:smoke

      - name: Build (unsigned, no publish)
        run: npm run build:mac -- --publish=never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - uses: actions/upload-artifact@v4
        with:
          name: nomokit-desktop-macos
          path: dist/**
